# Node.js with Angular
# Build a Node.js project that uses Angular.
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/javascript

trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - main
      - master

variables:
  # Angular app name
  appName: lekhaks-lens
  # image tag uses incremental version with 'v' prefix
  imageTag: 'v$(Rev:r)'
  registry: http://192.168.0.166:5005
  imageName: $(registry)/$(appName):$(imageTag)

pool:
  vmImage: 'ubuntu-latest'

steps:
- task: NodeTool@0
  displayName: 'Use Node.js 16'
  inputs:
    versionSpec: '16.x'

- script: |
    cd lekhaks-lens
    npm ci
    npm run build -- --configuration production
  displayName: 'Install and build Angular'

- script: |
    cd lekhaks-lens
    docker build -t $(imageName) .
  displayName: 'Build Docker image'

- script: |
    echo "Logging in to NAS registry"
    echo "$(REGISTRY_PASSWORD)" | docker login $(registry) --username "$(REGISTRY_USERNAME)" --password-stdin
  displayName: 'Docker login (private registry)'
  env:
    REGISTRY_USERNAME: $(REGISTRY_USERNAME)
    REGISTRY_PASSWORD: $(REGISTRY_PASSWORD)

- script: |
    docker push $(imageName)
  displayName: 'Push Docker image to NAS registry'

- script: |
    echo "Image pushed: $(imageName)"
  displayName: 'Show image reference'